<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block Blast Bricks</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/x-icon" href="img/favicon.png">
  <script src="js/jQuery.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/script.js"></script>
</head>
<body onload="init()">
  <div class="container">
    <div class="panel-glow"></div>
    <h1 class="game-title">Block Blast Bricks</h1>
    <p class="game-hint">
      Premik:
      <span class="key">←</span>
      <span id="info-key" class="key">→</span>
    </p>
    <div class="hud">
      <p class="stat-card">Level<label id="level">1</label></p>
      <p class="stat-card">Čas<label id="cas">00:00</label></p>
      <p class="stat-card">Točke<label id="tocke">0</label></p>
    </div>
    <div class="canvas-frame">
      <canvas id="canvas" width="1000" height="480"></canvas>
    </div>
    <div class="controls">
      <button id="start-btn" class="control-btn" type="button">Start</button>
      <button id="resume-btn" class="control-btn resume-btn" type="button">Pause</button>
      <button id="reset-btn" class="control-btn" type="button">Reset</button>
    </div>
  </div>
</body>
</html>
